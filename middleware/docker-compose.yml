services:
  middleware:
    image: "${BRIDGE_IMAGE:-docflow/bridge:local}"
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - ${DOCFLOW_ENV_FILE:-../.env}
    container_name: "${BRIDGE_CONTAINER:-naudoc_bridge_test}"
    environment:
      TZ: Europe/Moscow
      BRIDGE_DB_PATH: "${BRIDGE_DB_PATH:-/data/bridge.db}"
      NAUDOC_BASE_URL: "${NAUDOC_BASE_URL:-http://host.docker.internal:18080/docs}"
      NAUDOC_PUBLIC_URL: "${NAUDOC_PUBLIC_URL:-https://localhost:18443/docs}"
      NAUDOC_USERNAME: "${NAUDOC_USERNAME:-admin}"
      NAUDOC_PASSWORD: "${NAUDOC_PASSWORD:-admin}"
      RUKOVODITEL_BASE_URL: "${RUKOVODITEL_BASE_URL:-http://host.docker.internal:18081}"
      RUKOVODITEL_PUBLIC_URL: "${RUKOVODITEL_PUBLIC_URL:-https://localhost:18443}"
      RUKOVODITEL_DB_HOST: "${RUKOVODITEL_DB_HOST:-rukovoditel_db}"
      RUKOVODITEL_DB_PORT: "${RUKOVODITEL_DB_PORT:-3306}"
      RUKOVODITEL_DB_NAME: "${RUKOVODITEL_DB_NAME:-rukovoditel}"
      RUKOVODITEL_DB_USER: "${RUKOVODITEL_DB_USER:-rukovoditel}"
      RUKOVODITEL_DB_PASSWORD: "${RUKOVODITEL_DB_PASSWORD:-rukovoditel}"
      SYNC_CONTROL_URL: "${SYNC_CONTROL_URL:-http://host.docker.internal:18081/run_sync_job.php}"
      SYNC_CONTROL_TOKEN: "${BRIDGE_SYNC_CONTROL_TOKEN:-bridge_sync_control_dev}"
      BRIDGE_REQUEST_TIMEOUT: "${BRIDGE_REQUEST_TIMEOUT:-8}"
      LDAP_BIND_PASSWORD: "${LDAP_BIND_PASSWORD:-ldap_bind_dev}"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${BRIDGE_BIND_PORT:-18082}:8000"
    command:
      - /bin/sh
      - -lc
      - exec gunicorn --bind 0.0.0.0:8000 --workers "${BRIDGE_GUNICORN_WORKERS:-1}" --threads "${BRIDGE_GUNICORN_THREADS:-2}" --timeout "${BRIDGE_GUNICORN_TIMEOUT:-60}" app:app
    volumes:
      - "${BRIDGE_DATA_MOUNT:-bridge_data}:/data"
    restart: unless-stopped

  hospital_ldap:
    image: "${LDAP_IMAGE:-osixia/openldap:1.5.0}"
    profiles:
      - identity
    env_file:
      - ${DOCFLOW_ENV_FILE:-../.env}
    container_name: "${LDAP_CONTAINER_NAME:-docflow_hospital_ldap}"
    environment:
      LDAP_ORGANISATION: "${LDAP_ORGANISATION:-Hospital_DocFlow}"
      LDAP_DOMAIN: "${LDAP_DOMAIN:-hospital.local}"
      LDAP_ADMIN_PASSWORD: "${LDAP_ADMIN_PASSWORD:-ldap_admin_dev}"
      LDAP_CONFIG_PASSWORD: "${LDAP_CONFIG_PASSWORD:-ldap_config_dev}"
      LDAP_TLS: "false"
      KEEP_EXISTING_CONFIG: "false"
    command: --copy-service --loglevel info
    volumes:
      - "${LDAP_DATA_MOUNT:-bridge_ldap_data}:/var/lib/ldap"
      - "${LDAP_CONFIG_MOUNT:-bridge_ldap_config}:/etc/ldap/slapd.d"
      - ./runtime/ldap/bootstrap:/container/service/slapd/assets/config/bootstrap/ldif/custom:ro
    networks:
      default:
        aliases:
          - ldap.hospital.local
    restart: unless-stopped

volumes:
  bridge_data:
  bridge_ldap_data:
  bridge_ldap_config:
