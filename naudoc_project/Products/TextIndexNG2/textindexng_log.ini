[loggers]
keys=root

[handlers]
keys=stdout,textindexng

[formatters]
keys=form01

[logger_root]
level=ALL
propagate=1
channel=
parent=
qualname=(root)
handlers=stdout,textindexng


[handler_stdout]
class=StreamHandler
level=ALL
formatter=form01
stream=sys.stdout
args=(sys.stdout,)

[handler_textindexng]
class=FileHandler
level=DEBUG
formatter=form01
filename=textindexng.log
mode=w+
maxsize=0
backcount=1
args=('textindexng.log', 'a+')


[formatter_form01]
format=%(asctime)s %(filename)s:(%(lineno)d): %(levelname)s %(message)s
datefmt=%d.%m.%Y %H:%M:%S


