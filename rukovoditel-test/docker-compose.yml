services:
  rukovoditel_db:
    image: mariadb:10.11
    env_file:
      - ../.env
    container_name: "${RUKOVODITEL_DB_CONTAINER:-rukovoditel_db_test}"
    environment:
      MARIADB_DATABASE: "${RUKOVODITEL_DB_NAME:-rukovoditel}"
      MARIADB_USER: "${RUKOVODITEL_DB_USER:-rukovoditel}"
      MARIADB_PASSWORD: "${RUKOVODITEL_DB_PASSWORD:-rukovoditel}"
      MARIADB_ROOT_PASSWORD: "${RUKOVODITEL_DB_ROOT_PASSWORD:-root_rukovoditel}"
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    volumes:
      - rukovoditel_db_data:/var/lib/mysql
    restart: unless-stopped

  rukovoditel:
    build:
      context: .
      dockerfile: docker/Dockerfile
    env_file:
      - ../.env
    container_name: "${RUKOVODITEL_CONTAINER_NAME:-rukovoditel_test}"
    depends_on:
      - rukovoditel_db
    ports:
      - "18081:80"
    environment:
      TZ: Europe/Moscow
      RUKOVODITEL_DB_HOST: "rukovoditel_db"
      RUKOVODITEL_DB_PORT: "3306"
      RUKOVODITEL_DB_NAME: "${RUKOVODITEL_DB_NAME:-rukovoditel}"
      RUKOVODITEL_DB_USER: "${RUKOVODITEL_DB_USER:-rukovoditel}"
      RUKOVODITEL_DB_PASSWORD: "${RUKOVODITEL_DB_PASSWORD:-rukovoditel}"
      RUKOVODITEL_PUBLIC_URL: "${RUKOVODITEL_PUBLIC_URL:-https://localhost:18443}"
      NAUDOC_USERNAME: "${NAUDOC_USERNAME:-admin}"
      NAUDOC_PASSWORD: "${NAUDOC_PASSWORD:-admin}"
      NAUDOC_PUBLIC_URL: "${NAUDOC_PUBLIC_URL:-https://localhost:18443/docs}"
      BRIDGE_BASE_URL: "${BRIDGE_BASE_URL:-http://host.docker.internal:18082}"
      SYNC_CONTROL_TOKEN: "${BRIDGE_SYNC_CONTROL_TOKEN:-bridge_sync_control_dev}"
      ONLYOFFICE_INTEGRATION_BASE_URL: "${ONLYOFFICE_INTEGRATION_BASE_URL:-http://rukovoditel}"
      ONLYOFFICE_PUBLIC_JS_API_URL: "${ONLYOFFICE_PUBLIC_JS_API_URL:-https://localhost:18443/office/web-apps/apps/api/documents/api.js}"
      ONLYOFFICE_JWT_SECRET: "${ONLYOFFICE_JWT_SECRET:-onlyoffice_dev_secret}"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./dist:/var/www/html
    restart: unless-stopped

  onlyoffice_docs:
    image: onlyoffice/documentserver:latest
    env_file:
      - ../.env
    container_name: "${ONLYOFFICE_CONTAINER_NAME:-onlyoffice_docs_test}"
    environment:
      TZ: Europe/Moscow
      JWT_ENABLED: "true"
      JWT_SECRET: "${ONLYOFFICE_JWT_SECRET:-onlyoffice_dev_secret}"
    ports:
      - "18083:80"
    volumes:
      - onlyoffice_data:/var/www/onlyoffice/Data
      - onlyoffice_logs:/var/log/onlyoffice
      - onlyoffice_lib:/var/lib/onlyoffice
      - onlyoffice_db:/var/lib/postgresql
    shm_size: "1gb"
    restart: unless-stopped

  rukovoditel_sync_worker:
    build:
      context: .
      dockerfile: docker/Dockerfile
    env_file:
      - ../.env
    container_name: "${RUKOVODITEL_SYNC_WORKER_CONTAINER_NAME:-rukovoditel_sync_worker_test}"
    depends_on:
      - rukovoditel_db
      - rukovoditel
    environment:
      TZ: Europe/Moscow
      RUKOVODITEL_DB_HOST: "rukovoditel_db"
      RUKOVODITEL_DB_PORT: "3306"
      RUKOVODITEL_DB_NAME: "${RUKOVODITEL_DB_NAME:-rukovoditel}"
      RUKOVODITEL_DB_USER: "${RUKOVODITEL_DB_USER:-rukovoditel}"
      RUKOVODITEL_DB_PASSWORD: "${RUKOVODITEL_DB_PASSWORD:-rukovoditel}"
      RUKOVODITEL_PUBLIC_URL: "${RUKOVODITEL_PUBLIC_URL:-https://localhost:18443}"
      NAUDOC_USERNAME: "${NAUDOC_USERNAME:-admin}"
      NAUDOC_PASSWORD: "${NAUDOC_PASSWORD:-admin}"
      NAUDOC_PUBLIC_URL: "${NAUDOC_PUBLIC_URL:-https://localhost:18443/docs}"
      BRIDGE_BASE_URL: "${BRIDGE_BASE_URL:-http://host.docker.internal:18082}"
      SYNC_INTERVAL_SECONDS: "${SYNC_INTERVAL_SECONDS:-60}"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: ["/bin/bash", "/sync-worker.sh"]
    volumes:
      - ./dist:/var/www/html
      - ./docker/sync-worker.sh:/sync-worker.sh:ro
    restart: unless-stopped

volumes:
  rukovoditel_db_data:
  onlyoffice_data:
  onlyoffice_logs:
  onlyoffice_lib:
  onlyoffice_db:
